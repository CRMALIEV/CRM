<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Тестовый Класс — LMS Координатор</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    html, body { width: 100%; height: 100%; background: #121417; color: #fff; overflow: hidden; }
    
    /* Авторизация */
    #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0c0e; padding: 20px; }
    .auth-card { background: #1e2227; padding: 35px 25px; border-radius: 16px; width: 100%; max-width: 360px; text-align: center; border: 1px solid #2d3239; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .auth-card h2 { margin-bottom: 8px; color: #4da6ff; font-size: 22px; }
    .auth-card p { font-size: 13px; color: #9aa0a6; margin-bottom: 25px; }
    .btn-login { width: 100%; padding: 14px; margin-bottom: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; }
    .btn-teacher { background: #0084ff; color: #fff; }
    .btn-student { background: #28a745; color: #fff; }
    
    /* Главный интерфейс класса (Жесткая структура без вылезаний) */
    #classroom { display: none; flex-direction: column; width: 100vw; height: 100vh; background: #121417; }
    
    header { height: 48px; background: #1a1d22; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d3239; flex-shrink: 0; }
    .role-badge { background: #4da6ff; color: #000; padding: 3px 8px; border-radius: 10px; font-weight: bold; font-size: 11px; margin-left: 8px; }

    /* Центральная сцена */
    .stage-container { flex: 1; display: flex; flex-direction: column; gap: 10px; padding: 10px; overflow: hidden; position: relative; }
    
    /* Блок главной трансляции (Презентация) */
    #screen-stage { flex: 1; min-height: 0; background: #000; border-radius: 12px; border: 2px solid #28a745; display: none; position: relative; overflow: hidden; }
    #screen-stage video { width: 100%; height: 100%; object-fit: contain; }
    #screen-stage .stage-label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.75); padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; color: #28a745; z-index: 5; }

    /* Полоса веб-камер учеников и учителя */
    .cams-row { height: 140px; display: flex; gap: 10px; overflow-x: auto; overflow-y: hidden; flex-shrink: 0; padding-bottom: 5px; }
    
    /* В режиме без трансляции камеры занимают весь экран */
    .classroom-no-screen #screen-stage { display: none; }
    .classroom-no-screen .cams-row { flex: 1; height: auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); align-content: start; overflow-y: auto; }

    /* Карточка камеры */
    .cam-card { background: #000; border-radius: 8px; overflow: hidden; position: relative; aspect-ratio: 16/9; min-width: 180px; height: 100%; border: 1px solid #2d3239; flex-shrink: 0; }
    .classroom-no-screen .cam-card { min-width: unset; height: auto; }
    .cam-card video { width: 100%; height: 100%; object-fit: cover; }
    .cam-card .name-tag { position: absolute; bottom: 6px; left: 6px; background: rgba(0,0,0,0.75); padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }

    /* Закрепленная нижняя панель управления */
    .controls-bar { height: 60px; background: #1a1d22; border-top: 1px solid #2d3239; display: flex; justify-content: center; align-items: center; gap: 8px; padding: 0 10px; flex-shrink: 0; z-index: 10; }
    .btn { padding: 10px 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 6px; font-size: 13px; white-space: nowrap; transition: 0.15s; }
    .btn:active { transform: scale(0.96); }
    .btn-danger { background: #ff4d4d; color: #fff; }
    .btn-secondary { background: #2d3239; color: #fff; }
    .btn-success { background: #28a745; color: #fff; }
    .btn-warning { background: #ffc107; color: #000; }
    .btn-info { background: #17a2b8; color: #fff; }
  </style>
</head>
<body class="classroom-no-screen">

  <!-- 1. АВТОРИЗАЦИЯ -->
  <div id="auth-screen">
    <div class="auth-card">
      <h2>Быстрый Вход</h2>
      <p>Выберите роль для тестирования:</p>
      <button class="btn-login btn-teacher" onclick="loginAs('teacher')">👨‍🏫 Войти как Учитель</button>
      <button class="btn-login btn-student" onclick="loginAs('student')">👦 Войти как Ученик</button>
    </div>
  </div>

  <!-- 2. ИНТЕРФЕЙС КЛАССА -->
  <div id="classroom">
    <header>
      <div>
        <span id="user-display-name">Пользователь</span>
        <span id="user-role-badge" class="role-badge">Ученик</span>
      </div>
      <div style="font-size: 13px; color: #9aa0a6;">Платформа «Координатор»</div>
    </header>

    <div class="stage-container">
      <!-- Блок трансляции экрана -->
      <div id="screen-stage">
        <div class="stage-label" id="stage-label">🖥️ Трансляция Экрана</div>
        <video id="screen-video" autoplay playsinline></video>
      </div>

      <!-- Ряд видеокамер -->
      <div class="cams-row" id="cams-row">
        <!-- Карточки камиерас -->
      </div>
    </div>

    <!-- Фиксированный пульт управления -->
    <div class="controls-bar">
      <button class="btn btn-secondary" id="btn-mic" onclick="toggleMic()">🎙️ Микрофон</button>
      <button class="btn btn-secondary" id="btn-cam" onclick="toggleCam()">📷 Камера</button>
      
      <!-- Только у Учителя -->
      <button class="btn btn-success" id="btn-share" style="display:none;" onclick="shareScreen()">🖥️ Трансляция</button>
      <button class="btn btn-warning" id="btn-stop-share" style="display:none;" onclick="stopScreenShare()">⏹️ Стоп экран</button>
      <button class="btn btn-info" id="btn-pip" style="display:none;" onclick="togglePiP()">🔲 PiP</button>
      <button class="btn btn-info" id="btn-popout" style="display:none;" onclick="openPopoutWindow()">🗔 Окно Учителя</button>
      
      <button class="btn btn-danger" onclick="location.reload()">Выйти</button>
    </div>
  </div>

  <script>
    const ROOM_ID = "milky-school-test-room-2026";
    let currentUser = null;
    let localStream = null;
    let screenStream = null;
    let peer = null;
    let activeCalls = [];
    let popoutWindow = null;

    function loginAs(role) {
      if (role === 'teacher') {
        currentUser = { name: "Учитель", role: "teacher" };
      } else {
        const studentNumber = Math.floor(Math.random() * 899) + 100;
        currentUser = { name: `Ученик #${studentNumber}`, role: "student" };
      }

      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('classroom').style.display = 'flex';
      
      document.getElementById('user-display-name').innerText = currentUser.name;
      document.getElementById('user-role-badge').innerText = currentUser.role === 'teacher' ? 'УЧИТЕЛЬ' : 'УЧЕНИК';

      if (currentUser.role === 'teacher') {
        document.getElementById('btn-share').style.display = 'inline-flex';
        document.getElementById('btn-pip').style.display = 'inline-flex';
        document.getElementById('btn-popout').style.display = 'inline-flex';
      }

      startWebRTC();
    }

    async function startWebRTC() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        addCamCard('local-video', currentUser.name + " (Вы)", localStream, true);

        const peerId = currentUser.role === 'teacher' ? ROOM_ID : undefined;
        peer = new Peer(peerId);

        peer.on('open', (id) => {
          if (currentUser.role === 'student') {
            const call = peer.call(ROOM_ID, localStream, { metadata: { type: 'camera', studentName: currentUser.name } });
            handleIncomingCall(call);
          }
        });

        peer.on('call', (call) => {
          call.answer(localStream);
          handleIncomingCall(call);
        });

      } catch (err) {
        alert("Ошибка доступа к камере/микрофону: " + err.message);
      }
    }

    function handleIncomingCall(call) {
      activeCalls.push(call);
      call.on('stream', (remoteStream) => {
        const isScreen = call.metadata && call.metadata.type === 'screen';
        const studentName = (call.metadata && call.metadata.studentName) ? call.metadata.studentName : 'Ученик';
        
        if (isScreen) {
          showScreenStage(remoteStream, '🖥️ Трансляция Учителя');
        } else {
          addCamCard(call.peer, currentUser.role === 'teacher' ? studentName : 'Учитель', remoteStream);
        }
      });

      call.on('close', () => {
        hideScreenStage();
      });
    }

    // 1. ЗАПУСК И ОБНОВЛЕНИЕ ТРАНСЛЯЦИИ ЭКРАНА
    async function shareScreen() {
      if (screenStream) {
        stopScreenShare();
      }

      try {
        screenStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: "always" }, audio: false });

        showScreenStage(screenStream, '🖥️ Ваша Трансляция');
        document.getElementById('btn-stop-share').style.display = 'inline-flex';

        activeCalls.forEach(call => {
          peer.call(call.peer, screenStream, { metadata: { type: 'screen' } });
        });

        screenStream.getVideoTracks()[0].onended = () => {
          stopScreenShare();
        };

      } catch (e) {
        console.log("Отмена трансляции");
      }
    }

    function stopScreenShare() {
      if (screenStream) {
        screenStream.getTracks().forEach(track => track.stop());
        screenStream = null;
      }
      hideScreenStage();
      document.getElementById('btn-stop-share').style.display = 'none';
    }

    // Управление отображением Сцены Трансляции
    function showScreenStage(stream, labelText) {
      document.body.classList.remove('classroom-no-screen');
      const stage = document.getElementById('screen-stage');
      const video = document.getElementById('screen-video');
      document.getElementById('stage-label').innerText = labelText;
      video.srcObject = stream;
      stage.style.display = 'block';
    }

    function hideScreenStage() {
      document.body.classList.add('classroom-no-screen');
      const stage = document.getElementById('screen-stage');
      const video = document.getElementById('screen-video');
      video.srcObject = null;
      stage.style.display = 'none';
    }

    // Добавление веб-камеры в полосу
    function addCamCard(id, label, stream, isMuted = false) {
      let card = document.getElementById(id);
      if (!card) {
        const row = document.getElementById('cams-row');
        card = document.createElement('div');
        card.className = 'cam-card';
        card.id = id;

        const video = document.createElement('video');
        video.id = 'vid-' + id;
        video.srcObject = stream;
        video.autoplay = true;
        video.playsInline = true;
        if (isMuted) video.muted = true;

        const nameTag = document.createElement('div');
        nameTag.className = 'name-tag';
        nameTag.innerText = label;

        card.appendChild(video);
        card.appendChild(nameTag);
        row.appendChild(card);

        // Если открыто продвинутое окно учителя — дублируем поток туда
        updatePopoutCams();
      } else {
        card.querySelector('video').srcObject = stream;
      }
    }

    // 2. ВЫНОСНОЕ «ОКНО УЧИТЕЛЯ» С КАМЕРАМИ ДЕТЕЙ И ПУЛЬТОМ
    function openPopoutWindow() {
      popoutWindow = window.open("", "TeacherPopout", "width=500,height=700,resizable=yes");
      popoutWindow.document.write(`
        <html>
        <head>
          <title>Видеокабинет Учителя</title>
          <style>
            body { background: #121417; color: #fff; font-family: sans-serif; margin:0; padding: 10px; display:flex; flex-direction:column; height:100vh; box-sizing:border-box; }
            h4 { text-align: center; color: #4da6ff; margin-bottom: 10px; }
            #popout-cams { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; overflow-y: auto; }
            .pop-card { background: #000; border-radius: 8px; position: relative; aspect-ratio: 16/9; overflow: hidden; border: 1px solid #2d3239; }
            .pop-card video { width:100%; height:100%; object-fit:cover; }
            .pop-card .tag { position:absolute; bottom:4px; left:4px; background:rgba(0,0,0,0.7); font-size:10px; padding:2px 5px; border-radius:3px; }
            .pop-controls { display:flex; gap:6px; justify-content:center; margin-top:10px; flex-wrap:wrap; }
            button { padding:8px 12px; border:none; border-radius:6px; font-weight:bold; cursor:pointer; font-size:12px; }
            .btn-blue { background:#0084ff; color:#fff; }
            .btn-green { background:#28a745; color:#fff; }
          </style>
        </head>
        <body>
          <h4>👨‍🏫 Ученики (Плавающий экран)</h4>
          <div id="popout-cams"></div>
          <div class="pop-controls">
            <button class="btn-blue" onclick="window.opener.toggleMic()">🎙️ Микрофон</button>
            <button class="btn-blue" onclick="window.opener.toggleCam()">📷 Камера</button>
            <button class="btn-green" onclick="window.opener.shareScreen()">🖥️ Сменить Экран</button>
          </div>
        </body>
        </html>
      `);
      updatePopoutCams();
    }

    function updatePopoutCams() {
      if (!popoutWindow || popoutWindow.closed) return;
      const container = popoutWindow.document.getElementById('popout-cams');
      if (!container) return;
      
      container.innerHTML = '';
      document.querySelectorAll('.cam-card').forEach(card => {
        const origVideo = card.querySelector('video');
        const name = card.querySelector('.name-tag').innerText;
        
        const popCard = popoutWindow.document.createElement('div');
        popCard.className = 'pop-card';
        
        const v = popoutWindow.document.createElement('video');
        v.srcObject = origVideo.srcObject;
        v.autoplay = true;
        v.playsInline = true;
        
        const t = popoutWindow.document.createElement('div');
        t.className = 'tag';
        t.innerText = name;

        popCard.appendChild(v);
        popCard.appendChild(t);
        container.appendChild(popCard);
      });
    }

    function toggleMic() {
      if (!localStream) return;
      const track = localStream.getAudioTracks()[0];
      if (track) {
        track.enabled = !track.enabled;
        const btn = document.getElementById('btn-mic');
        btn.style.opacity = track.enabled ? '1' : '0.4';
      }
    }

    function toggleCam() {
      if (!localStream) return;
      const track = localStream.getVideoTracks()[0];
      if (track) {
        track.enabled = !track.enabled;
        const btn = document.getElementById('btn-cam');
        btn.style.opacity = track.enabled ? '1' : '0.4';
      }
    }

    async function togglePiP() {
      try {
        const screenVideo = document.getElementById('screen-video');
        if (screenVideo && document.pictureInPictureEnabled) {
          if (document.pictureInPictureElement) {
            await document.exitPictureInPicture();
          } else {
            await screenVideo.requestPictureInPicture();
          }
        }
      } catch (e) {
        console.error("Ошибка PiP:", e);
      }
    }
  </script>
</body>
</html>
