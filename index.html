<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Тестовый Класс — LMS Координатор</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { background: #1a1d20; color: #fff; height: 100vh; display: flex; flex-direction: column; }
    
    #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f1113; }
    .auth-card { background: #24282c; padding: 25px; border-radius: 12px; width: 300px; text-align: center; }
    .auth-card input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #3a3f45; background: #1a1d20; color: #fff; }
    .auth-card button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #0084ff; color: #fff; font-weight: bold; cursor: pointer; }
    
    #classroom { display: none; flex-direction: column; height: 100vh; }
    header { background: #24282c; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3a3f45; }
    .role-badge { background: #4da6ff; color: #000; padding: 3px 8px; border-radius: 10px; font-weight: bold; font-size: 11px; }
    
    .main-area { flex: 1; padding: 10px; overflow-y: auto; }
    .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
    .video-card { background: #000; border-radius: 10px; overflow: hidden; position: relative; aspect-ratio: 16/9; border: 2px solid #3a3f45; }
    .video-card video { width: 100%; height: 100%; object-fit: cover; }
    .video-card .name-tag { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); padding: 3px 8px; border-radius: 6px; font-size: 11px; z-index: 2; }
    
    .controls { background: #24282c; padding: 10px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; border-top: 1px solid #3a3f45; }
    .btn { padding: 10px 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; color: #fff; }
    .btn-danger { background: #ff4d4d; }
    .btn-secondary { background: #3a3f45; }
    .btn-success { background: #28a745; }
    .btn-info { background: #17a2b8; }
  </style>
</head>
<body>

  <!-- ВХОД В ОДИН КЛИК ИЛИ ПО ПРОСТОМУ ЛОГИНУ (admin/5 или 1/1) -->
  <div id="auth-screen">
    <div class="auth-card">
      <h3 style="margin-bottom:15px;">Тестовый Вход</h3>
      <input type="text" id="login" placeholder="Логин (admin или 1)">
      <input type="password" id="password" placeholder="Пароль (5 или 1)">
      <button onclick="login()">Войти</button>
    </div>
  </div>

  <div id="classroom">
    <header>
      <div>
        <span id="user-display-name">Пользователь</span>
        <span id="user-role-badge" class="role-badge">Ученик</span>
      </div>
      <div>Виртуальный Класс</div>
    </header>

    <div class="main-area">
      <div class="video-grid" id="video-grid"></div>
    </div>

    <div class="controls">
      <button class="btn btn-secondary" onclick="toggleMic()">🎙️ Микрофон</button>
      <button class="btn btn-secondary" onclick="toggleCam()">📷 Камера</button>
      
      <!-- Кнопки управления учителя -->
      <button class="btn btn-success" id="btn-share" style="display:none;" onclick="shareScreen()">🖥️ Трансляция экрана</button>
      <button class="btn btn-info" id="btn-popout" style="display:none;" onclick="openPopoutWindow()">🗔 Окно Учителя (Управление)</button>
      
      <button class="btn btn-danger" onclick="location.reload()">Выйти</button>
    </div>
  </div>

  <script>
    // Простая локальная авторизация
    const USERS_DB = [
      { login: "admin", pass: "5", name: "Учитель", role: "teacher" },
      { login: "1", pass: "1", name: "Ученик 1", role: "student" },
      { login: "2", pass: "1", name: "Ученик 2", role: "student" }
    ];

    const ROOM_ID = "milky-school-test-room-2026";
    let currentUser = null;
    let localStream = null;
    let peer = null;

    function login() {
      const l = document.getElementById('login').value.trim();
      const p = document.getElementById('password').value.trim();
      const user = USERS_DB.find(u => u.login === l && u.pass === p);
      
      if (!user) {
        alert("Используйте: admin / 5 (Учитель) или 1 / 1 (Ученик)");
        return;
      }

      currentUser = user;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('classroom').style.display = 'flex';
      
      document.getElementById('user-display-name').innerText = user.name;
      document.getElementById('user-role-badge').innerText = user.role === 'teacher' ? 'УЧИТЕЛЬ' : 'УЧЕНИК';

      if (user.role === 'teacher') {
        document.getElementById('btn-share').style.display = 'inline-flex';
        document.getElementById('btn-popout').style.display = 'inline-flex';
      }

      startWebRTC();
    }

    async function startWebRTC() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        addVideoCard('local-video', currentUser.name + " (Вы)", localStream, true);

        const peerId = currentUser.role === 'teacher' ? ROOM_ID : undefined;
        peer = new Peer(peerId);

        peer.on('open', (id) => {
          if (currentUser.role === 'student') {
            const call = peer.call(ROOM_ID, localStream);
            call.on('stream', (remoteStream) => {
              addVideoCard('teacher-video', 'Учитель', remoteStream);
            });
          }
        });

        peer.on('call', (call) => {
          call.answer(localStream);
          call.on('stream', (remoteStream) => {
            addVideoCard(call.peer, 'Ученик', remoteStream);
          });
        });

      } catch (err) {
        alert("Ошибка доступа к медиа: " + err.message);
      }
    }

    function addVideoCard(id, label, stream, isMuted = false) {
      if (document.getElementById(id)) return;
      const grid = document.getElementById('video-grid');
      const card = document.createElement('div');
      card.className = 'video-card';
      card.id = id;

      const video = document.createElement('video');
      video.id = 'video-element-' + id;
      video.srcObject = stream;
      video.autoplay = true;
      video.setAttribute('playsinline', ''); // Исправление для телефонов
      if (isMuted) video.muted = true;

      const nameTag = document.createElement('div');
      nameTag.className = 'name-tag';
      nameTag.innerText = label;

      card.appendChild(video);
      card.appendChild(nameTag);
      grid.appendChild(card);
    }

    // ВСПЛЫВАЮЩЕЕ ОКНО УЧИТЕЛЯ С ПУЛЬТОМ ОТКЛЮЧЕНИЯ
    function openPopoutWindow() {
      const popout = window.open("", "TeacherPopout", "width=400,height=500,resizable=yes");
      popout.document.write(`
        <html>
        <head>
          <title>Управление Учениками</title>
          <style>
            body { background:#1a1d20; color:#fff; font-family:sans-serif; padding:15px; margin:0; }
            .item { background:#24282c; padding:10px; margin-bottom:8px; border-radius:6px; display:flex; justify-content:space-between; align-items:center; }
            button { padding:6px 10px; border:none; border-radius:4px; background:#ff4d4d; color:#fff; cursor:pointer; font-size:11px; margin-left:4px; }
          </style>
        </head>
        <body>
          <h3 style="color:#4da6ff; margin-bottom:12px;">Управление Учениками</h3>
          <div id="list"></div>
          <script>
            function updateList() {
              const list = document.getElementById('list');
              list.innerHTML = '';
              window.opener.document.querySelectorAll('.video-card').forEach(card => {
                if (card.id !== 'local-video') {
                  const name = card.querySelector('.name-tag').innerText;
                  const div = document.createElement('div');
                  div.className = 'item';
                  div.innerHTML = \`
                    <span>\${name}</span>
                    <div>
                      <button onclick="window.opener.muteStudent('\${card.id}')">🎙️ Выкл Звук</button>
                      <button onclick="window.opener.hideStudentVideo('\${card.id}')">📷 Выкл Видео</button>
                    </div>
                  \`;
                  list.appendChild(div);
                }
              });
            }
            setInterval(updateList, 1500);
            updateList();
          <\/script>
        </body>
        </html>
      `);
    }

    // Функция точечного отключения звука
    function muteStudent(cardId) {
      const videoElem = document.querySelector(`#${cardId} video`);
      if (videoElem) {
        videoElem.muted = !videoElem.muted;
      }
    }

    // Функция точечного отключения видео
    function hideStudentVideo(cardId) {
      const videoElem = document.querySelector(`#${cardId} video`);
      if (videoElem) {
        videoElem.style.visibility = videoElem.style.visibility === 'hidden' ? 'visible' : 'hidden';
      }
    }

    async function shareScreen() {
      try {
        const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: { displaySurface: "monitor" } });
        addVideoCard('screen-share', 'Экран Учителя', screenStream);
      } catch (e) {
        console.log("Трансляция отменена");
      }
    }

    function toggleMic() {
      const track = localStream.getAudioTracks()[0];
      if (track) track.enabled = !track.enabled;
    }

    function toggleCam() {
      const track = localStream.getVideoTracks()[0];
      if (track) track.enabled = !track.enabled;
    }
  </script>
</body>
</html>
