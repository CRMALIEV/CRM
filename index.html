<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Тестовый Класс — LMS Координатор</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    html, body { width: 100%; height: 100%; background: #121417; color: #fff; overflow: hidden; }
    
    /* Экран входа */
    #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: #0b0c0e; padding: 20px; }
    .auth-card { background: #1e2227; padding: 30px 20px; border-radius: 16px; width: 100%; max-width: 360px; text-align: center; border: 1px solid #2d3239; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .auth-card h2 { margin-bottom: 8px; color: #4da6ff; font-size: 22px; }
    .auth-card p { font-size: 13px; color: #9aa0a6; margin-bottom: 25px; }
    .btn-login { width: 100%; padding: 14px; margin-bottom: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; }
    .btn-teacher { background: #0084ff; color: #fff; }
    .btn-student { background: #28a745; color: #fff; }
    
    /* Главный рабочий класс */
    #classroom { display: none; flex-direction: column; width: 100vw; height: 100vh; position: relative; background: #121417; }
    
    header { height: 48px; background: #1a1d22; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d3239; flex-shrink: 0; z-index: 10; }
    .role-badge { background: #4da6ff; color: #000; padding: 3px 8px; border-radius: 10px; font-weight: bold; font-size: 11px; margin-left: 8px; }

    /* Область сцены */
    .stage-container { flex: 1; display: flex; flex-direction: column; gap: 10px; padding: 10px; padding-bottom: 75px; overflow-y: auto; overflow-x: hidden; }
    
    /* Блок трансляции экрана */
    #screen-stage { height: 55vh; min-height: 200px; background: #000; border-radius: 12px; border: 2px solid #28a745; display: none; position: relative; overflow: hidden; flex-shrink: 0; }
    #screen-stage video { width: 100%; height: 100%; object-fit: contain; }
    #screen-stage .stage-label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.75); padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; color: #28a745; z-index: 5; }

    /* Сетка видеокамер */
    .cams-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; width: 100%; }
    
    /* Карточка видеокамеры */
    .cam-card { background: #000; border-radius: 10px; overflow: hidden; position: relative; aspect-ratio: 16/9; border: 1px solid #2d3239; display: flex; flex-direction: column; justify-content: flex-end; }
    .cam-card video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
    .cam-card .info-bar { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.85)); padding: 6px 8px; display: flex; justify-content: space-between; align-items: center; z-index: 2; }
    .cam-card .name-tag { font-size: 11px; font-weight: bold; color: #fff; text-shadow: 0 1px 2px #000; }
    
    /* Кнопки модерации для учителя */
    .teacher-actions { display: flex; gap: 4px; }
    .btn-mod { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 3px 6px; border-radius: 4px; font-size: 10px; cursor: pointer; backdrop-filter: blur(4px); }
    .btn-mod:hover { background: #ff4d4d; }

    /* ГАРАНТИРОВАННО ЗАКРЕПЛЕННЫЙ НИЖНИЙ ПУЛЬТ (Никогда не исчезает) */
    .controls-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: #1a1d22; border-top: 1px solid #2d3239; display: flex; justify-content: center; align-items: center; gap: 6px; padding: 0 10px; z-index: 9999; flex-wrap: nowrap; overflow-x: auto; }
    .btn { padding: 10px 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
    .btn-danger { background: #ff4d4d; color: #fff; }
    .btn-secondary { background: #2d3239; color: #fff; }
    .btn-success { background: #28a745; color: #fff; }
    .btn-warning { background: #ffc107; color: #000; }
    .btn-info { background: #17a2b8; color: #fff; }
  </style>
</head>
<body>

  <!-- 1. ЭКРАН ВХОДА -->
  <div id="auth-screen">
    <div class="auth-card">
      <h2>Быстрый Вход</h2>
      <p>Выберите роль для подключения:</p>
      <button class="btn-login btn-teacher" onclick="loginAs('teacher')">👨‍🏫 Войти как Учитель</button>
      <button class="btn-login btn-student" onclick="loginAs('student')">👦 Войти как Ученик</button>
    </div>
  </div>

  <!-- 2. ИНТЕРФЕЙС УРОКА -->
  <div id="classroom">
    <header>
      <div>
        <span id="user-display-name">Пользователь</span>
        <span id="user-role-badge" class="role-badge">Ученик</span>
      </div>
      <div style="font-size: 12px; color: #9aa0a6;">«Координатор»</div>
    </header>

    <div class="stage-container">
      <!-- Трансляция Экрана -->
      <div id="screen-stage">
        <div class="stage-label" id="stage-label">🖥️ Трансляция Экрана</div>
        <video id="screen-video" autoplay playsinline></video>
      </div>

      <!-- Сетка Камер -->
      <div class="cams-grid" id="cams-grid"></div>
    </div>

    <!-- Фиксированный Пульт Управления -->
    <div class="controls-bar">
      <button class="btn btn-secondary" id="btn-mic" onclick="toggleMic()">🎙️ Микрофон</button>
      <button class="btn btn-secondary" id="btn-cam" onclick="toggleCam()">📷 Камера</button>
      
      <!-- Только для Учителя -->
      <button class="btn btn-success" id="btn-share" style="display:none;" onclick="shareScreen()">🖥️ Трансляция</button>
      <button class="btn btn-warning" id="btn-stop-share" style="display:none;" onclick="stopScreenShare()">⏹️ Стоп экран</button>
      <button class="btn btn-info" id="btn-pip" style="display:none;" onclick="togglePiP()">🔲 PiP</button>
      <button class="btn btn-info" id="btn-popout" style="display:none;" onclick="openPopoutWindow()">🗔 Окно Учителя</button>
      
      <button class="btn btn-danger" onclick="location.reload()">Выйти</button>
    </div>
  </div>

  <script>
    const ROOM_ID = "milky-school-test-room-2026";
    let currentUser = null;
    let localStream = null;
    let screenStream = null;
    let peer = null;
    let activeConnections = {}; // Храним DataConnection к каждому ученику
    let popoutWindow = null;

    function loginAs(role) {
      if (role === 'teacher') {
        currentUser = { name: "Учитель", role: "teacher" };
      } else {
        const studentNumber = Math.floor(Math.random() * 899) + 100;
        currentUser = { name: `Ученик #${studentNumber}`, role: "student" };
      }

      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('classroom').style.display = 'flex';
      
      document.getElementById('user-display-name').innerText = currentUser.name;
      document.getElementById('user-role-badge').innerText = currentUser.role === 'teacher' ? 'УЧИТЕЛЬ' : 'УЧЕНИК';

      if (currentUser.role === 'teacher') {
        document.getElementById('btn-share').style.display = 'inline-flex';
        document.getElementById('btn-pip').style.display = 'inline-flex';
        document.getElementById('btn-popout').style.display = 'inline-flex';
      }

      startWebRTC();
    }

    async function startWebRTC() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        addCamCard('local-video', currentUser.name + " (Вы)", localStream, true);

        const peerId = currentUser.role === 'teacher' ? ROOM_ID : undefined;
        peer = new Peer(peerId);

        peer.on('open', (id) => {
          if (currentUser.role === 'student') {
            // Подключение к Учителю
            const call = peer.call(ROOM_ID, localStream, { metadata: { type: 'camera', studentName: currentUser.name } });
            handleIncomingCall(call);

            // Сигнальный канал для получения команд модерации от Учителя
            const conn = peer.connect(ROOM_ID);
            conn.on('data', handleDataMessage);
          }
        });

        // Прием звонков и сигналов у Учителя
        peer.on('call', (call) => {
          call.answer(localStream);
          handleIncomingCall(call);
        });

        peer.on('connection', (conn) => {
          activeConnections[conn.peer] = conn;
        });

      } catch (err) {
        alert("Ошибка доступа к камере/микрофону: " + err.message);
      }
    }

    // Обработка команд модерации (Принудительное выключение звука/видео)
    function handleDataMessage(data) {
      if (data.action === 'mute_mic') {
        const track = localStream.getAudioTracks()[0];
        if (track) {
          track.enabled = false;
          updateMicBtnState(false);
          alert("Учитель отключил ваш микрофон");
        }
      } else if (data.action === 'mute_cam') {
        const track = localStream.getVideoTracks()[0];
        if (track) {
          track.enabled = false;
          updateCamBtnState(false);
          alert("Учитель отключил вашу камеру");
        }
      }
    }

    function handleIncomingCall(call) {
      call.on('stream', (remoteStream) => {
        const isScreen = call.metadata && call.metadata.type === 'screen';
        const studentName = (call.metadata && call.metadata.studentName) ? call.metadata.studentName : 'Ученик';
        
        if (isScreen) {
          showScreenStage(remoteStream, '🖥️ Трансляция Учителя');
        } else {
          addCamCard(call.peer, currentUser.role === 'teacher' ? studentName : 'Учитель', remoteStream, false, call.peer);
        }
      });

      call.on('close', () => {
        removeCamCard(call.peer);
      });
    }

    // Добавление видеокаточки
    function addCamCard(id, label, stream, isMuted = false, peerId = null) {
      let card = document.getElementById(id);
      if (!card) {
        const grid = document.getElementById('cams-grid');
        card = document.createElement('div');
        card.className = 'cam-card';
        card.id = id;

        const video = document.createElement('video');
        video.srcObject = stream;
        video.autoplay = true;
        video.playsInline = true;
        video.setAttribute('playsinline', 'true');
        if (isMuted) video.muted = true;

        const infoBar = document.createElement('div');
        infoBar.className = 'info-bar';

        const nameTag = document.createElement('span');
        nameTag.className = 'name-tag';
        nameTag.innerText = label;
        infoBar.appendChild(nameTag);

        // Если вошел Учитель и это карточка Ученика — добавляем кнопки отключения
        if (currentUser.role === 'teacher' && peerId) {
          const modBox = document.createElement('div');
          modBox.className = 'teacher-actions';
          modBox.innerHTML = `
            <button class="btn-mod" onclick="remoteMuteStudent('${peerId}', 'mic')" title="Выключить микрофон">🔇</button>
            <button class="btn-mod" onclick="remoteMuteStudent('${peerId}', 'cam')" title="Выключить камеру">🚫</button>
          `;
          infoBar.appendChild(modBox);
        }

        card.appendChild(video);
        card.appendChild(infoBar);
        grid.appendChild(card);

        updatePopoutCams();
      } else {
        card.querySelector('video').srcObject = stream;
      }
    }

    function removeCamCard(id) {
      const card = document.getElementById(id);
      if (card) card.remove();
      updatePopoutCams();
    }

    // Команда Учителя на отключение микрофона/камеры ученика
    function remoteMuteStudent(peerId, type) {
      const conn = activeConnections[peerId];
      if (conn) {
        conn.send({ action: type === 'mic' ? 'mute_mic' : 'mute_cam' });
      }
    }

    // Управление трансляцией
    async function shareScreen() {
      if (screenStream) stopScreenShare();

      try {
        screenStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: "always" }, audio: false });
        showScreenStage(screenStream, '🖥️ Ваша Трансляция');
        document.getElementById('btn-stop-share').style.display = 'inline-flex';

        // Рассылаем экран ученикам
        Object.keys(activeConnections).forEach(pId => {
          peer.call(pId, screenStream, { metadata: { type: 'screen' } });
        });

        screenStream.getVideoTracks()[0].onended = () => stopScreenShare();
      } catch (e) {
        console.log("Отмена трансляции");
      }
    }

    function stopScreenShare() {
      if (screenStream) {
        screenStream.getTracks().forEach(track => track.stop());
        screenStream = null;
      }
      document.getElementById('screen-stage').style.display = 'none';
      document.getElementById('btn-stop-share').style.display = 'none';
    }

    function showScreenStage(stream, labelText) {
      const stage = document.getElementById('screen-stage');
      const video = document.getElementById('screen-video');
      document.getElementById('stage-label').innerText = labelText;
      video.srcObject = stream;
      stage.style.display = 'block';
    }

    // ЕДИНСТВЕННОЕ И ЧИСТОЕ ВЫНОСНОЕ ОКНО УЧИТЕЛЯ (Без дублирования!)
    function openPopoutWindow() {
      if (popoutWindow && !popoutWindow.closed) {
        popoutWindow.focus();
        return;
      }

      popoutWindow = window.open("", "TeacherPopout", "width=450,height=600,resizable=yes");
      popoutWindow.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <title>Видеокабинет Учителя</title>
          <style>
            * { box-sizing: border-box; margin:0; padding:0; font-family:sans-serif; }
            body { background: #121417; color: #fff; padding: 10px; display:flex; flex-direction:column; height:100vh; }
            h4 { text-align: center; color: #4da6ff; margin-bottom: 10px; font-size:14px; }
            #popout-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; overflow-y: auto; }
            .pop-card { background: #000; border-radius: 8px; position: relative; aspect-ratio: 16/9; overflow: hidden; border: 1px solid #2d3239; }
            .pop-card video { width:100%; height:100%; object-fit:cover; }
            .pop-card .tag { position:absolute; bottom:4px; left:4px; background:rgba(0,0,0,0.7); font-size:10px; padding:2px 5px; border-radius:3px; }
            .pop-controls { display:flex; gap:6px; justify-content:center; padding-top:10px; flex-wrap:nowrap; }
            button { padding:8px 10px; border:none; border-radius:6px; font-weight:bold; cursor:pointer; font-size:11px; white-space:nowrap; }
            .btn-blue { background:#0084ff; color:#fff; }
            .btn-green { background:#28a745; color:#fff; }
          </style>
        </head>
        <body>
          <h4>👨‍🏫 Ученики (Плавающий экран)</h4>
          <div id="popout-grid"></div>
          <div class="pop-controls">
            <button class="btn-blue" onclick="window.opener.toggleMic()">🎙️ Микрофон</button>
            <button class="btn-blue" onclick="window.opener.toggleCam()">📷 Камера</button>
            <button class="btn-green" onclick="window.opener.shareScreen()">🖥️ Сменить Экран</button>
          </div>
        </body>
        </html>
      `);
      updatePopoutCams();
    }

    function updatePopoutCams() {
      if (!popoutWindow || popoutWindow.closed) return;
      const grid = popoutWindow.document.getElementById('popout-grid');
      if (!grid) return;
      
      grid.innerHTML = '';
      document.querySelectorAll('.cam-card').forEach(card => {
        const origVideo = card.querySelector('video');
        const name = card.querySelector('.name-tag').innerText;
        
        const popCard = popoutWindow.document.createElement('div');
        popCard.className = 'pop-card';
        
        const v = popoutWindow.document.createElement('video');
        v.srcObject = origVideo.srcObject;
        v.autoplay = true;
        v.playsInline = true;
        
        const t = popoutWindow.document.createElement('div');
        t.className = 'tag';
        t.innerText = name;

        popCard.appendChild(v);
        popCard.appendChild(t);
        grid.appendChild(popCard);
      });
    }

    // Вкл/Выкл локального микрофона и камеры
    function toggleMic() {
      if (!localStream) return;
      const track = localStream.getAudioTracks()[0];
      if (track) {
        track.enabled = !track.enabled;
        updateMicBtnState(track.enabled);
      }
    }

    function toggleCam() {
      if (!localStream) return;
      const track = localStream.getVideoTracks()[0];
      if (track) {
        track.enabled = !track.enabled;
        updateCamBtnState(track.enabled);
      }
    }

    function updateMicBtnState(enabled) {
      const btn = document.getElementById('btn-mic');
      btn.style.opacity = enabled ? '1' : '0.4';
      btn.innerText = enabled ? '🎙️ Микрофон' : '🔇 Выкл Микр';
    }

    function updateCamBtnState(enabled) {
      const btn = document.getElementById('btn-cam');
      btn.style.opacity = enabled ? '1' : '0.4';
      btn.innerText = enabled ? '📷 Камера' : '🚫 Выкл Кам';
    }

    async function togglePiP() {
      try {
        const screenVideo = document.getElementById('screen-video');
        if (screenVideo && document.pictureInPictureEnabled) {
          if (document.pictureInPictureElement) {
            await document.exitPictureInPicture();
          } else {
            await screenVideo.requestPictureInPicture();
          }
        }
      } catch (e) {
        console.error("Ошибка PiP:", e);
      }
    }
  </script>
</body>
</html>
