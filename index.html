ы<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Тестовый Класс — LMS Координатор</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #1a1d20; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    /* Экран входа */
    #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f1113; padding: 20px; }
    .auth-card { background: #24282c; padding: 25px; border-radius: 16px; width: 100%; max-width: 340px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .auth-card input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #3a3f45; background: #1a1d20; color: #fff; font-size: 16px; }
    .auth-card button { width: 100%; padding: 14px; border: none; border-radius: 8px; background: #0084ff; color: #fff; font-weight: bold; font-size: 16px; cursor: pointer; }
    
    /* Основной класс */
    #classroom { display: none; flex-direction: column; height: 100vh; position: relative; }
    header { background: #24282c; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3a3f45; font-size: 14px; }
    .role-badge { background: #4da6ff; color: #000; padding: 3px 8px; border-radius: 10px; font-weight: bold; font-size: 11px; }
    
    .main-area { flex: 1; padding: 10px; overflow-y: auto; }
    
    /* Адаптивная сетка видео */
    .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }
    @media (min-width: 768px) {
      .video-grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
    }
    
    .video-card { background: #000; border-radius: 12px; overflow: hidden; position: relative; aspect-ratio: 4/3; border: 2px solid #3a3f45; }
    @media (min-width: 768px) { .video-card { aspect-ratio: 16/9; } }
    
    /* ВАЖНО ДЛЯ МОБИЛЬНЫХ: Видео не вылезает за пределы */
    .video-card video { width: 100%; height: 100%; object-fit: cover; background: #111; }
    
    .video-card .name-tag { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); padding: 3px 8px; border-radius: 6px; font-size: 11px; z-index: 2; }
    
    /* Кнопки управления НА КАРТОЧКЕ УЧЕНИКА (Для Учителя) */
    .card-actions { position: absolute; bottom: 8px; right: 8px; display: flex; gap: 5px; z-index: 2; }
    .btn-mini { padding: 5px 8px; font-size: 11px; border: none; border-radius: 6px; background: rgba(0,0,0,0.7); color: #fff; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
    .btn-mini:active { background: #ff4d4d; }

    /* НИЖНЯЯ ПАНЕЛЬ КНОПОК (Адаптирована под мобильные) */
    .controls { background: #24282c; padding: 10px; display: flex; justify-content: center; gap: 8px; border-top: 1px solid #3a3f45; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .btn { padding: 10px 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 4px; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
    .btn-danger { background: #ff4d4d; color: #fff; }
    .btn-secondary { background: #3a3f45; color: #fff; }
    .btn-success { background: #28a745; color: #fff; }
    .btn-info { background: #17a2b8; color: #fff; }
  </style>
</head>
<body>

  <div id="auth-screen">
    <div class="auth-card">
      <h3 style="margin-bottom:15px; color:#4da6ff;">Вход в Виртуальный Класс</h3>
      <input type="text" id="login" placeholder="Логин (admin или 1)">
      <input type="password" id="password" placeholder="Пароль (5 или 1)">
      <button onclick="login()">Войти на урок</button>
      <p id="error-msg" style="color: #ff4d4d; margin-top: 10px; font-size: 12px;"></p>
    </div>
  </div>

  <div id="classroom">
    <header>
      <div>
        <span id="user-display-name">Пользователь</span>
        <span id="user-role-badge" class="role-badge">Ученик</span>
      </div>
      <div>Урок онлайн</div>
    </header>

    <div class="main-area">
      <div class="video-grid" id="video-grid">
        </div>
    </div>

    <div class="controls">
      <button class="btn btn-secondary" onclick="toggleMic()">🎙️ Мик</button>
      <button class="btn btn-secondary" onclick="toggleCam()">📷 Камера</button>
      
      <button class="btn btn-success" id="btn-share" style="display:none;" onclick="shareScreen()">🖥️ Экран</button>
      <button class="btn btn-info" id="btn-popout" style="display:none;" onclick="openPopoutWindow()">🗔 Окно Учителя</button>
      
      <button class="btn btn-danger" onclick="location.reload()">Выйти</button>
    </div>
  </div>

  <script>
    const USERS_DB = [
      { login: "admin", pass: "5", name: "Учитель (Анна И.)", role: "teacher" },
      { login: "1", pass: "1", name: "Ученик 1 (Тел)", role: "student" },
      { login: "2", pass: "1", name: "Ученик 2", role: "student" }
    ];

    const ROOM_ID = "milky-school-test-room-2026";
    let currentUser = null;
    let localStream = null;
    let peer = null;
    let popoutWindowRef = null;

    async function login() {
      const l = document.getElementById('login').value.trim();
      const p = document.getElementById('password').value.trim();
      const user = USERS_DB.find(u => u.login === l && u.pass === p);
      
      if (!user) {
        document.getElementById('error-msg').innerText = "Неверный логин или пароль";
        return;
      }

      currentUser = user;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('classroom').style.display = 'flex';
      
      document.getElementById('user-display-name').innerText = user.name;
      document.getElementById('user-role-badge').innerText = user.role === 'teacher' ? 'УЧИТЕЛЬ' : 'УЧЕНИК';

      if (user.role === 'teacher') {
        document.getElementById('btn-share').style.display = 'inline-flex';
        document.getElementById('btn-popout').style.display = 'inline-flex';
      }

      // Запрашиваем медиа-разрешения
      await startWebRTC();
    }

    async function startWebRTC() {
      try {
        // ВАЖНО ДЛЯ ТЕЛЕФОНОВ: Запрашиваем явный доступ к камере и микрофону
        localStream = await navigator.mediaDevices.getUserMedia({ 
          video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" }, 
          audio: true 
        });
        
        addVideoCard('local-video', currentUser.name + " (Вы)", localStream, true);

        const peerId = currentUser.role === 'teacher' ? ROOM_ID : undefined;
        peer = new Peer(peerId);

        peer.on('open', (id) => {
          if (currentUser.role === 'student') {
            const call = peer.call(ROOM_ID, localStream);
            call.on('stream', (remoteStream) => {
              addVideoCard('teacher-video', 'Учитель', remoteStream);
            });
          }
        });

        peer.on('call', (call) => {
          call.answer(localStream);
          call.on('stream', (remoteStream) => {
            addVideoCard(call.peer, 'Ученик', remoteStream);
          });
        });

      } catch (err) {
        alert("ОШИБКА ДОСТУПА! Перейдите в настройки телефона -> Браузер -> Разрешите Камеру и Микрофон. Ошибка: " + err.message);
      }
    }

    // Создание карточки с ОБЯЗАТЕЛЬНЫМИ атрибутами для мобильных устройств
    function addVideoCard(id, label, stream, isMuted = false) {
      if (document.getElementById(id)) return;
      
      const grid = document.getElementById('video-grid');
      const card = document.createElement('div');
      card.className = 'video-card';
      card.id = id;

      const video = document.createElement('video');
      video.id = 'video-element-' + id;
      video.srcObject = stream;
      video.autoplay = true;
      // ВАЖНО ДЛЯ IPHONE / ANDROID: Запрещает полноэкранный плеер iOS и разрешает воспроизведение
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');
      if (isMuted) video.muted = true;

      const nameTag = document.createElement('div');
      nameTag.className = 'name-tag';
      nameTag.innerText = label;

      card.appendChild(video);
      card.appendChild(nameTag);

      // ЕСЛИ УЧИТЕЛЬ: Добавляем точечные кнопки управления прямо на карточку ученика!
      if (currentUser.role === 'teacher' && id !== 'local-video') {
        const actions = document.createElement('div');
        actions.className = 'card-actions';
        actions.innerHTML = `
          <button class="btn-mini" onclick="toggleStudentAudio('${id}')">🎙️ Выкл Звук</button>
          <button class="btn-mini" onclick="toggleStudentVideo('${id}')">📷 Выкл Видео</button>
        `;
        card.appendChild(actions);
      }

      grid.appendChild(card);
      
      // Авто-воспроизведение для мобильных (обход автоплей-блокировки)
      video.play().catch(e => console.log("Требуется клик для воспроизведения"));
    }

    // ТОЧЕЧНОЕ ОТКЛЮЧЕНИЕ УЧИТЕЛЕМ
    function toggleStudentAudio(cardId) {
      const videoElem = document.querySelector(`#${cardId} video`);
      if (videoElem) {
        videoElem.muted = !videoElem.muted;
        alert(videoElem.muted ? "Звук ученика заглушен у учителя" : "Звук ученика включен");
      }
    }

    function toggleStudentVideo(cardId) {
      const videoElem = document.querySelector(`#${cardId} video`);
      if (videoElem) {
        videoElem.style.display = videoElem.style.display === 'none' ? 'block' : 'none';
      }
    }

    // ПЛАВАЮЩЕЕ ОКНО УЧИТЕЛЯ (С кнопками управления учениками)
    function openPopoutWindow() {
      popoutWindowRef = window.open("", "TeacherPopout", "width=450,height=600,resizable=yes");
      popoutWindowRef.document.write(`
        <html>
        <head>
          <title>Плавающая панель Учителя</title>
          <style>
            body { background: #1a1d20; color: #fff; font-family: sans-serif; padding: 10px; margin:0; }
            .pop-card { background: #24282c; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
            button { padding: 6px 10px; border: none; border-radius: 6px; background: #ff4d4d; color: #fff; cursor: pointer; font-size: 11px; }
          </style>
        </head>
        <body>
          <h4 style="margin-bottom:10px; color:#4da6ff;">Управление учениками</h4>
          <div id="popout-students-list">
            </div>
          <script>
            function refreshList() {
              const list = document.getElementById('popout-students-list');
              list.innerHTML = '';
              window.opener.document.querySelectorAll('.video-card').forEach(card => {
                if (card.id !== 'local-video') {
                  const name = card.querySelector('.name-tag').innerText;
                  const item = document.createElement('div');
                  item.className = 'pop-card';
                  item.innerHTML = \`
                    <span>\${name}</span>
                    <div>
                      <button onclick="window.opener.toggleStudentAudio('\${card.id}')">🎙️ Глушить</button>
                      <button onclick="window.opener.toggleStudentVideo('\${card.id}')">📷 Видео</button>
                    </div>
                  \`;
                  list.appendChild(item);
                }
              });
            }
            setInterval(refreshList, 2000);
            refreshList();
          <\/script>
        </body>
        </html>
      `);
    }

    async function shareScreen() {
      try {
        const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        addVideoCard('screen-share', 'Экран Учителя', screenStream);
      } catch (e) {
        console.log("Отмена выбора экрана");
      }
    }

    function toggleMic() {
      const track = localStream.getAudioTracks()[0];
      if (track) track.enabled = !track.enabled;
    }

    function toggleCam() {
      const track = localStream.getVideoTracks()[0];
      if (track) track.enabled = !track.enabled;
    }
  </script>
</body>
</html>
