<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тестовый Класс — LMS Координатор</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background: #1a1d20; color: #fff; height: 100vh; display: flex; flex-direction: column; }
    
    /* Авторизация */
    #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f1113; }
    .auth-card { background: #24282c; padding: 30px; border-radius: 12px; width: 320px; text-align: center; }
    .auth-card input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #3a3f45; background: #1a1d20; color: #fff; }
    .auth-card button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #0084ff; color: #fff; font-weight: bold; cursor: pointer; }
    
    /* Кабинет */
    #classroom { display: none; flex-direction: column; height: 100vh; }
    header { background: #24282c; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3a3f45; }
    .role-badge { background: #4da6ff; color: #000; padding: 4px 10px; border-radius: 12px; font-weight: bold; font-size: 12px; }
    
    .main-area { display: flex; flex: 1; overflow: hidden; }
    
    /* Сетка видео */
    .video-grid { flex: 1; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; align-content: start; }
    .video-card { background: #000; border-radius: 10px; overflow: hidden; position: relative; aspect-ratio: 16/9; border: 2px solid #3a3f45; }
    .video-card video { width: 100%; height: 100%; object-fit: cover; }
    .video-card .name-tag { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    
    /* Пульт управления */
    .controls { background: #24282c; padding: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; border-top: 1px solid #3a3f45; }
    .btn { padding: 10px 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .btn-danger { background: #ff4d4d; color: #fff; }
    .btn-secondary { background: #3a3f45; color: #fff; }
    .btn-success { background: #28a745; color: #fff; }
    .btn-info { background: #17a2b8; color: #fff; }
  </style>
</head>
<body>

  <!-- АВТОРИЗАЦИЯ -->
  <div id="auth-screen">
    <div class="auth-card">
      <h2 style="margin-bottom:15px;">Вход в Урок</h2>
      <input type="text" id="login" placeholder="Логин (teacher или student1)">
      <input type="password" id="password" placeholder="Пароль (123)">
      <button onclick="login()">Войти в класс</button>
      <p id="error-msg" style="color: #ff4d4d; margin-top: 10px; font-size: 12px;"></p>
    </div>
  </div>

  <!-- ИНТЕРФЕЙС УРОКА -->
  <div id="classroom">
    <header>
      <div>
        <span id="user-display-name">Пользователь</span>
        <span id="user-role-badge" class="role-badge">Ученик</span>
      </div>
      <div>Виртуальный Класс «Координатор»</div>
    </header>

    <div class="main-area">
      <div class="video-grid" id="video-grid">
        <!-- Видиопотоки -->
      </div>
    </div>

    <!-- Улучшенная Панель Управления -->
    <div class="controls">
      <button class="btn btn-secondary" onclick="toggleMic()">🎙️ Микрофон</button>
      <button class="btn btn-secondary" onclick="toggleCam()">📷 Камера</button>
      
      <!-- Функции трансляции и окон (Для Учителя) -->
      <button class="btn btn-success" id="btn-share" style="display:none;" onclick="shareScreen()">🖥️ Трансляция (Экран / Окно / Вкладка)</button>
      <button class="btn btn-info" id="btn-pip" style="display:none;" onclick="togglePiP()">🔲 Картинка в картинке</button>
      <button class="btn btn-info" id="btn-popout" style="display:none;" onclick="openPopoutWindow()">🗔 Отдельное окно</button>
      
      <button class="btn btn-danger" onclick="location.reload()">Выйти из урока</button>
    </div>
  </div>

  <script>
    const USERS_DB = [
      { login: "teacher", pass: "123", name: "Учитель (Анна Ивановна)", role: "teacher" },
      { login: "student1", pass: "123", name: "Иванов Ваня", role: "student" }
    ];

    const ROOM_ID = "milky-school-test-room-2026";
    let currentUser = null;
    let localStream = null;
    let peer = null;

    function login() {
      const l = document.getElementById('login').value.trim();
      const p = document.getElementById('password').value.trim();
      const user = USERS_DB.find(u => u.login === l && u.pass === p);
      
      if (!user) {
        document.getElementById('error-msg').innerText = "Неверный логин или пароль";
        return;
      }

      currentUser = user;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('classroom').style.display = 'flex';
      
      document.getElementById('user-display-name').innerText = user.name;
      document.getElementById('user-role-badge').innerText = user.role === 'teacher' ? 'УЧИТЕЛЬ' : 'УЧЕНИК';

      if (user.role === 'teacher') {
        document.getElementById('btn-share').style.display = 'inline-flex';
        document.getElementById('btn-pip').style.display = 'inline-flex';
        document.getElementById('btn-popout').style.display = 'inline-flex';
      }

      startWebRTC();
    }

    async function startWebRTC() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        addVideoCard('local-video', currentUser.name + " (Вы)", localStream, true);

        const peerId = currentUser.role === 'teacher' ? ROOM_ID : undefined;
        peer = new Peer(peerId);

        peer.on('open', (id) => {
          if (currentUser.role === 'student') {
            const call = peer.call(ROOM_ID, localStream);
            call.on('stream', (remoteStream) => {
              addVideoCard('teacher-video', 'Учитель', remoteStream);
            });
          }
        });

        peer.on('call', (call) => {
          call.answer(localStream);
          call.on('stream', (remoteStream) => {
            addVideoCard(call.peer, 'Ученик', remoteStream);
          });
        });
      } catch (err) {
        alert("Ошибка доступа к камере/микрофону: " + err.message);
      }
    }

    function addVideoCard(id, label, stream, isMuted = false) {
      if (document.getElementById(id)) return;
      const grid = document.getElementById('video-grid');
      const card = document.createElement('div');
      card.className = 'video-card';
      card.id = id;

      const video = document.createElement('video');
      video.id = 'video-element-' + id;
      video.srcObject = stream;
      video.autoplay = true;
      video.playsInline = true;
      if (isMuted) video.muted = true;

      const nameTag = document.createElement('div');
      nameTag.className = 'name-tag';
      nameTag.innerText = label;

      card.appendChild(video);
      card.appendChild(nameTag);
      grid.appendChild(card);
    }

    // 1. ВЫБОР ТРАНСЛЯЦИИ (ВЕСЬ ЭКРАН / ОКНО / ВКЛАДКА)
    async function shareScreen() {
      try {
        // Браузер сам покажет системное окно выбора: Весь экран, Окно приложения или Вкладка
        const screenStream = await navigator.mediaDevices.getDisplayMedia({ 
          video: { cursor: "always" },
          audio: false 
        });
        addVideoCard('screen-share', 'Трансляция Экрана/Окна', screenStream);
      } catch (e) {
        console.log("Отмена выбора экрана");
      }
    }

    // 2. РЕЖИМ PICTURE-IN-PICTURE (Картинка в картинке поверх всех окон)
    async function togglePiP() {
      try {
        const firstVideo = document.querySelector('.video-card video');
        if (firstVideo && document.pictureInPictureEnabled) {
          if (document.pictureInPictureElement) {
            await document.exitPictureInPicture();
          } else {
            await firstVideo.requestPictureInPicture();
          }
        } else {
          alert("Режим Picture-in-Picture не поддерживается вашим браузером");
        }
      } catch (e) {
        console.error("Ошибка PiP:", e);
      }
    }

    // 3. РЕЖИМ «ОТДЕЛЬНОЕ ОКНО» (Pop-out Window)
    function openPopoutWindow() {
      const popout = window.open("", "PopoutClassroom", "width=400,height=600,resizable=yes");
      popout.document.write(`
        <html>
        <head><title>Плавающее окно Учителя</title></head>
        <body style="background:#1a1d20; color:#fff; font-family:sans-serif; padding:10px; text-align:center;">
          <h3>Мини-панель Учителя</h3>
          <p style="font-size:12px; color:#aaa; margin-top:5px;">Это окно можно сжать и расположить рядом с презентацией.</p>
          <div style="margin-top:20px;">
            <button onclick="window.opener.toggleMic()" style="padding:10px; margin:5px;">🎙️ Вкл/Выкл Микрофон</button>
            <button onclick="window.opener.toggleCam()" style="padding:10px; margin:5px;">📷 Вкл/Выкл Камеру</button>
          </div>
        </body>
        </html>
      `);
    }

    function toggleMic() {
      const track = localStream.getAudioTracks()[0];
      if (track) track.enabled = !track.enabled;
    }

    function toggleCam() {
      const track = localStream.getVideoTracks()[0];
      if (track) track.enabled = !track.enabled;
    }
  </script>
</body>
</html>
